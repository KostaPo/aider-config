# ============================================================
# .aider.model.settings.yml — настройки поведения модели
#
# Управляет тем КАК aider работает с моделью:
# формат редактирования, repo map, стриминг и тд.
#
# Размер контекста и стоимость — в .aider.model.metadata.json
# ============================================================

- name: openai/Qwen3.5-35B

  # Формат редактирования файлов
  # whole  — модель переписывает файл целиком (надёжнее для локальных моделей)
  # diff   — только изменения в виде diff
  edit_format: whole

  # Карта репозитория — aider анализирует структуру проекта
  # и передаёт её модели даже без явного указания файлов
  use_repo_map: true

  # Стриминг — показывать ответ по мере генерации
  streaming: true

  # Передавать системный промпт — необходим для корректной работы aider
  use_system_prompt: true

  # Использовать temperature — управление случайностью ответов
  use_temperature: true

  # Передавать примеры в системном промпте (а не в истории чата)
  # false = примеры идут в историю, что лучше для большинства моделей
  examples_as_sys_msg: false

  # Дополнительные параметры передаваемые напрямую в API запрос
  extra_params:
    # Максимум токенов в ответе модели
    max_tokens: 8192